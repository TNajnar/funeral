<div class="flex justify-between">
  <div class="relative flex gap-20 items-center w-full">
    <span class="text-gray-dark font-medium">
      Graf o sjednanych sluzbach a pohrbech v {{ _currentMonth }}
    </span>

    <app-graph
      [data]="[10, 15]"
      [labels]="['Pohřby', 'Služby']"
      label="# počet naplanovanych"
      chartType="doughnut"
      [colors]="['#ff6384', '#ff9f40']"
    />
  </div>

  <div class="flex gap-10 w-2/5">
    <button mat-fab extended>Novy pohreb</button>
    <button mat-fab extended>Nova sluzba</button>
  </div>
</div>

<div class="flex self-center gap-8 w-full">
  <div class="w-full">
    <h4 class="text-start text-lg">Naplanovane pohřby</h4>

    <!-- Table TODO -->
  </div>
  
  <div class="w-full">
    <h4 class="text-start text-lg">Naplanovane sluzby</h4>

    <!-- Table TODO -->
  </div>
</div>
