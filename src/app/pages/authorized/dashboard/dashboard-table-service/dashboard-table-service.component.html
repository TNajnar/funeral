<table mat-table class="table" [dataSource]="dataSource">
  <ng-container matColumnDef="dateOfNegotiation">
    <th mat-header-cell *matHeaderCellDef>Datum sjednani</th>
    <td mat-cell *matCellDef="let element" class="cell row">{{ element.dateOfNegotiation }}</td>
  </ng-container>

  <ng-container matColumnDef="placeCeremony">
    <th mat-header-cell *matHeaderCellDef>Misto obradu</th>
    <td mat-cell *matCellDef="let element" class="cell">
      <input
        class="input-table"
        [id]="'placeCeremony' + element.id"
        name="placeCeremony"
        type="text"
        [(ngModel)]="element.placeCeremony"
      />
    </td>
  </ng-container>

  <ng-container matColumnDef="timeCeremony">
    <th mat-header-cell *matHeaderCellDef>Datum a cas obradu</th>
    <td mat-cell *matCellDef="let element" class="cell">
      <input
        class="input-table"
        [id]="'timeCeremony' + element.id"
        name="timeCeremony"
        type="text"
        [(ngModel)]="element.timeCeremony"
      />
    </td>
  </ng-container>

  <ng-container matColumnDef="deceased">
    <th mat-header-cell *matHeaderCellDef>Zesnuly</th>
    <td mat-cell *matCellDef="let element" class="cell">
      <input
        class="input-table"
        [id]="'deceased' + element.id"
        name="deceased"
        type="text"
        [(ngModel)]="element.deceased"
      />
    </td>
  </ng-container>

  <ng-container matColumnDef="customer">
    <th mat-header-cell *matHeaderCellDef>Objednatel</th>
    <td mat-cell *matCellDef="let element" class="cell">
      <input
        class="input-table w-full"
        [id]="'customer' + element.id"
        name="customer"
        type="text"
        [(ngModel)]="element.customer"
      />
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="['dateOfNegotiation', 'placeCeremony', 'timeCeremony', 'deceased', 'customer']" class="row"></tr>
  <tr mat-row *matRowDef="let row; columns: ['dateOfNegotiation', 'placeCeremony', 'timeCeremony', 'deceased', 'customer']" class="row"></tr>
</table>
